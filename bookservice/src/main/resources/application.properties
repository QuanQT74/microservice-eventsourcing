spring.application.name=bookservice
server.port=9001
eureka.client.service-url.defaultZone=http://discoveryservice:8761/eureka
axon.axonserver.servers=axonserver

# Reset tracking tokens on startup to fix stuck processor
axon.eventhandling.processors.command.event.resetTokensOnStartup=true

spring.datasource.url=jdbc:mysql://mysql:3306/book_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.init-data=true
