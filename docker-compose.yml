version: '3.8'
services:
  discoveryservice:
    build:
      context: .
      dockerfile: discoverserver/Dockerfile
    ports:
      - "8761:8761"
    networks:
      - microservice-networks

  axonserver:
    image: "axoniq/axonserver:latest"
    hostname: axonserver
    container_name: axonserver
    environment:
      - AXONIQ_AXONSERVER_STANDALONE=true
    ports:
      - "8024:8024"
      - "8124:8124"
      - "8224:8224"
    networks:
      - microservice-networks
  redis:
    image: redis:latest
    restart: always
    hostname: redis
    ports:
      - "6379:6379"
    networks:
      - microservice-networks
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - microservice-networks
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  broker:
    image: confluentinc/cp-server:7.7.0
    hostname: broker
    container_name: broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    networks:
      - microservice-networks
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://broker:9092
      KAFKA_METRIC_REPORTERS: io.confluent.metrics.reporter.ConfluentMetricsReporter
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      CONFLUENT_METRICS_REPORTER_BOOTSTRAP_SERVERS: broker:29092
      CONFLUENT_METRICS_REPORTER_TOPIC_REPLICAS: 1
      CONFLUENT_METRICS_ENABLE: 'true'
      CONFLUENT_SUPPORT_CUSTOMER_ID: 'anonymous'

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.7.0
    hostname: control-center
    container_name: control-center
    depends_on:
      - broker
    ports:
      - "9021:9021"
    networks:
      - microservice-networks
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'broker:29092'
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - microservice-networks

  notificationservice:
    build:
      context: .
      dockerfile: notificationservice/Dockerfile
    ports:
      - "9003:9003"
    networks:
      - microservice-networks
    environment:
      - "SPRING_KAFKA_BOOTSTRAP_SERVERS=broker:29092"
      - "KAFKA_BOOTSTRAP_SERVERS=broker:29092"
      - "AXON_AXONSERVER_SERVERS=axonserver:8124"
    depends_on:
      - broker
      - zookeeper
      - axonserver
  apigateway:
    build:
      context: .
      dockerfile: apigateway/Dockerfile
    ports:
      - "8085:8085"
    networks:
      - microservice-networks
    depends_on:
      - discoveryservice
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
  userservice:
    build:
      context: .
      dockerfile: userservice/Dockerfile
    ports:
      - "9004:9004"
    networks:
      - microservice-networks
    depends_on:
      - discoveryservice
      - mysql
      - axonserver
    environment:
      - AXON_AXONSERVER_SERVERS=axonserver
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discoveryservice:8761/eureka
      - IDP_URL=http://keycloak:8080
      - SERVER_PORT=9004
      - EMPLOYEE_SERVICE_URL=http://employeeservice:9002
    extra_hosts:
      - "host.docker.internal:host-gateway"
  bookservice:
    build:
      context: .
      dockerfile: bookservice/Dockerfile
    ports:
      - "9001:9001"
    networks:
      - microservice-networks
    depends_on:
      - discoveryservice
      - mysql
      - axonserver
    environment:
      - AXON_AXONSERVER_SERVERS=axonserver
    # ĐÚNG
  borrowingservice:
    build:
      context: .
      dockerfile: borrowingservice/Dockerfile
    ports:
      - "9005:9005"
    networks:
      - microservice-networks
    depends_on:
      - discoveryservice
      - mysql
      - axonserver
    environment:
      - AXON_AXONSERVER_SERVERS=axonserver
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8180:8080"
    networks:
      - microservice-networks
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    networks:
      - microservice-networks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  employeeservice:
    build:
      context: .
      dockerfile: employeeservice/Dockerfile
    ports:
      - "9002:9002"
    networks:
      - microservice-networks
    depends_on:
      - discoveryservice
      - mysql
      - axonserver
    environment:
      - AXON_AXONSERVER_SERVERS=axonserver
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/employee_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discoveryservice:8761/eureka
networks:
  microservice-networks:
    name: eventsourcing_microservice-networks
    driver: bridge
volumes:
  mysql-data:
