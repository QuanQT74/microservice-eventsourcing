server:
  port: 8085
spring:
  application:
    name: gateway-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/laptrinhfullstack
  data:
    redis:
      port: 6379
      host: redis
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: employeeservice
          uri: lb://employeeservice
          predicates:
            - Path=/api/v1/employees/**
          filters:
            - JwtHeaderFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
            
        - id: bookservice
          uri: lb://bookservice
          predicates:
            - Path=/api/v1/books/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: borrowingservice
          uri: lb://borrowingservice
          predicates:
            - Path=/api/v1/borrowings/**
          filters:
            - JwtHeaderFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: borrowingservice-command
          uri: lb://borrowingservice
          predicates:
            - Path=/api/v1/borrowing/**
          filters:
            - JwtHeaderFilter
          
        - id: userservice-register
          uri: http://userservice:9004
          predicates:
            - Path=/api/v1/users/register
            - Method=POST

        - id: userservice-public
          uri: http://userservice:9004
          predicates:
            - Path=/api/v1/users/me/**
          filters:
            - RemoveRequestHeader=Authorization

        - id: userservice
          uri: http://userservice:9004
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: JwtHeaderFilter
eureka:
  instance:
    hostname: discoveryservice
  client:
    service-url:
      defaultZone: http://discoveryservice:8761/eureka
    register-with-eureka: true
    fetch-registry: true


